<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
       <header id="login-header">

        <div id="logo"><img src="img/logo-github.png" alt="GitHub"></div>

        <h1>Faça login no Github</h1>
       </header>

       <section id="form-area">

        <form id="login-form">

            <label for="email">Email</label>

            <input type="email" id="email" placeholder="Digite o seu email">

            <label for="password">Senha</label>

            <input type="password" id= "password" placeholder="Digite a sua senha">

            <a href="#" class="senha">Esqueceu a sua senha?</a>
            
            <button class="btn" type="submit">Entrar</button>
            <p id="mensagem"></p>
        </form>
       

       <h3>ou</h3>

       
        <a href="#" class="social-link link-google">Continuar com Google</a>
        

        <a href="#" class="social-link link-apple">Continuar com Apple</a>
        

        <h3>É novo no GitHub? <a href="#">Crie uma conta</a></h3>
        

        <a href="#">Faça login com uma chave de acesso.</a>

       

       </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
