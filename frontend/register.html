<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub - Criar conta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <header id="login-header">
            <div id="logo"><img src="img/logo-github.png" alt="GitHub"></div>
            <h1>Crie a sua conta</h1>
        </header>

        <section id="form-area">
            <form id="register-form">

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite o seu email">

                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite a sua senha">

                <ul id="password-rules">
                    <li id="rule-length">Mínimo de 8 caracteres</li>
                    <li id="rule-upper">Uma letra maiúscula</li>
                    <li id="rule-lower">Uma letra minúscula</li>
                    <li id="rule-special">Um caractere especial</li>
                </ul>

                <button class="btn" type="submit">Criar conta</button>
                <p id="mensagem"></p>
            </form>

            <h3>Já tem uma conta? <a href="index.html">Faça login</a></h3>
        </section>
    </main>
    <script src="js/register.js"></script>
</body>
</html>
